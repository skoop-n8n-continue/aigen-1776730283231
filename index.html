<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Flower Tiers – Quality Roots</title>
  <style>
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Bold-Italic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Geomanist';
      src: url('assets/fonts/Geomanist-Black-Italic.otf') format('opentype');
      font-weight: 900;
      font-style: italic;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #1e3028;
      font-family: 'Geomanist', 'Arial Black', sans-serif;
    }

    /* ─── BACKGROUND VIDEO ─────────────────────────────────── */
    #bgVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
    }

    /* ─── PRODUCT OVERLAY ──────────────────────────────────── */
    #productOverlay {
      position: absolute;
      top: 150px;
      left: 50px;
      width: 1820px;
      padding-top: 22px;
      transform: translateY(960px);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
      will-change: transform, opacity;
    }

    #productOverlay.visible {
      transform: translateY(0);
      opacity: 1;
    }

    /* ─── OUTER FRAME (dark green border → white inner border) ── */
    .tiers-table-outer {
      width: 1820px;
      border-radius: 24px;
      background: #253529;
      padding: 9px;
      overflow: hidden;
    }

    /* ─── MAIN TIERS TABLE ─────────────────────────────────── */
    .tiers-table {
      width: 100%;
      border-radius: 15px;
      border: 3px solid rgba(255,255,255,0.78);
      overflow: hidden;
      background: #253529;
    }

    /* Header Row */
    .table-header {
      display: flex;
      height: 82px;
      background: #253529;
      border-bottom: 2.5px solid rgba(255,255,255,0.75);
    }

    .header-icon-cell {
      width: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon-cell img {
      width: 50px;
      height: auto;
      opacity: 0.88;
    }

    .header-size-cell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #ECE7D5;
      letter-spacing: 0.01em;
      border-left: 2.5px solid rgba(255,255,255,0.75);
    }

    /* Diagonal slash fraction in header */
    .frac {
      display: inline-flex;
      flex-direction: row;
      align-items: baseline;
      font-family: 'Geomanist', 'Arial Black', sans-serif;
      font-weight: 700;
      color: #ECE7D5;
      line-height: 1;
      font-size: 40px;
    }
    .frac-num {
      font-size: 0.60em;
      position: relative;
      top: -0.52em;
      line-height: 0;
      font-family: 'Geomanist', 'Arial Black', sans-serif;
    }
    .frac-slash {
      font-size: 1em;
      margin: 0 1px;
      font-family: 'Geomanist', 'Arial Black', sans-serif;
    }
    .frac-den {
      font-size: 0.60em;
      position: relative;
      top: 0.52em;
      line-height: 0;
      font-family: 'Geomanist', 'Arial Black', sans-serif;
    }

    /* Tier Rows */
    .tier-row {
      display: flex;
      height: 192px;
      border-top: 2.5px solid rgba(255,255,255,0.75);
    }

    .tier-num-cell {
      width: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 152px;
      font-weight: 900;
      font-style: italic;
      color: #ECE7D5;
      background: #253529;
      flex-shrink: 0;
      line-height: 1;
      overflow: visible;
    }

    .prices-row {
      flex: 1;
      display: flex;
      background: #ECE7D5;
    }

    .price-cell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-left: 2px solid rgba(110, 98, 78, 0.35);
    }

    /* first price cell separates dark green tier column from beige area → white */
    .price-cell:first-child {
      border-left: 2.5px solid rgba(255,255,255,0.75);
    }

    /* ─── STRIKETHROUGH BADGE ──────────────────────────────── */
    .strike-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid #253529;
      border-radius: 999px;
      padding: 7px 20px 7px 16px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .strike-badge-inner {
      display: inline-flex;
      align-items: baseline;
      font-weight: 700;
      color: #1e2a20;
    }

    .strike-badge-dollar {
      font-size: 18px;
      position: relative;
      top: -5px;
      margin-right: 1px;
    }

    .strike-badge-amount {
      font-size: 30px;
    }

    /* Red diagonal slash */
    .strike-badge::after {
      content: '';
      position: absolute;
      left: -6%;
      width: 112%;
      height: 4px;
      background: #c8200e;
      border-radius: 2px;
      transform: rotate(-22deg);
    }

    /* ─── SALE PRICE ───────────────────────────────────────── */
    .sale-price {
      display: inline-flex;
      align-items: baseline;
      color: #1e2a20;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
      flex-shrink: 0;
    }

    .sale-price sup {
      font-size: 56px;
      font-weight: 900;
      font-style: italic;
      vertical-align: top;
      line-height: 1;
      margin-top: 10px;
    }

    .sale-price-amount {
      font-size: 130px;
      font-weight: 900;
      font-style: italic;
      line-height: 0.88;
    }

    /* ─── BULK BOXES ───────────────────────────────────────── */
    .bulk-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .bulk-box {
      flex: 1;
      height: 175px;
      background: #253529;
      border: 3px solid #4e7a5a;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 40px;
    }

    .bulk-label {
      font-size: 60px;
      font-weight: 900;
      font-style: italic;
      color: #A8C37E;
      line-height: 1.05;
      text-transform: uppercase;
      text-align: left;
      flex-shrink: 0;
    }

    .bulk-price-group {
      display: inline-flex;
      align-items: baseline;
      color: #ECE7D5;
      font-weight: 900;
      font-style: italic;
      line-height: 1;
    }

    .bulk-price-group sup {
      font-size: 42px;
      font-weight: 900;
      font-style: italic;
      vertical-align: top;
      line-height: 1;
      margin-top: 8px;
    }

    .bulk-price-num {
      font-size: 96px;
      font-weight: 900;
      font-style: italic;
      line-height: 0.9;
    }

    .bulk-price-unit {
      font-size: 38px;
      font-weight: 900;
      font-style: italic;
      vertical-align: bottom;
      margin-bottom: 10px;
      margin-left: 2px;
    }

    .bulk-divider {
      font-size: 88px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1;
      align-self: center;
      margin: 0 6px;
    }
  </style>
</head>
<body>

  <!-- Template video as background (includes intro animation → FLOWER TIERS backdrop) -->
  <video id="bgVideo" autoplay muted playsinline>
    <source src="https://skoop-general.s3.us-east-1.amazonaws.com/1776730367589-template_blank_tiers.mp4" type="video/mp4">
  </video>

  <!-- Product data overlay (slides in after intro) -->
  <div id="productOverlay">

    <!-- ─── OUTER DARK FRAME → INNER WHITE BORDER → CELLS ──── -->
    <div class="tiers-table-outer">
      <div class="tiers-table">

        <!-- Header Row -->
        <div class="table-header">
          <div class="header-icon-cell">
            <img src="assets/logos/QR_Icon_White.png" alt="QR">
          </div>
          <div class="header-size-cell"><span class="frac"><span class="frac-num">1</span><span class="frac-slash">/</span><span class="frac-den">8</span></span></div>
          <div class="header-size-cell"><span class="frac"><span class="frac-num">1</span><span class="frac-slash">/</span><span class="frac-den">4</span></span></div>
          <div class="header-size-cell"><span class="frac"><span class="frac-num">1</span><span class="frac-slash">/</span><span class="frac-den">2</span></span></div>
          <div class="header-size-cell">OZ</div>
        </div>

        <!-- Tier 1 -->
        <div class="tier-row">
          <div class="tier-num-cell">1</div>
          <div class="prices-row">
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">25</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">22</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">45</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">40</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">75</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">70</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">140</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">120</span></span>
            </div>
          </div>
        </div>

        <!-- Tier 2 -->
        <div class="tier-row">
          <div class="tier-num-cell">2</div>
          <div class="prices-row">
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">20</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">18</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">35</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">30</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">65</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">60</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">120</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">100</span></span>
            </div>
          </div>
        </div>

        <!-- Tier 3 -->
        <div class="tier-row">
          <div class="tier-num-cell">3</div>
          <div class="prices-row">
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">15</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">13</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">30</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">25</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">55</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">50</span></span>
            </div>
            <div class="price-cell">
              <span class="strike-badge"><span class="strike-badge-inner"><span class="strike-badge-dollar">$</span><span class="strike-badge-amount">100</span></span></span>
              <span class="sale-price"><sup>$</sup><span class="sale-price-amount">90</span></span>
            </div>
          </div>
        </div>

      </div><!-- end .tiers-table -->
    </div><!-- end .tiers-table-outer -->

    <!-- ─── BULK PRICING BOXES ───────────────────────────── -->
    <div class="bulk-row">

      <div class="bulk-box">
        <div class="bulk-label">BULK<br>100</div>
        <span class="bulk-price-group"><sup>$</sup><span class="bulk-price-num">45</span><span class="bulk-price-unit">½</span></span>
        <span class="bulk-divider">|</span>
        <span class="bulk-price-group"><sup>$</sup><span class="bulk-price-num">80</span><span class="bulk-price-unit">oz</span></span>
      </div>

      <div class="bulk-box">
        <div class="bulk-label">REGULAR<br>BULK</div>
        <span class="bulk-price-group"><sup>$</sup><span class="bulk-price-num">50</span><span class="bulk-price-unit">½</span></span>
        <span class="bulk-divider">|</span>
        <span class="bulk-price-group"><sup>$</sup><span class="bulk-price-num">90</span><span class="bulk-price-unit">oz</span></span>
      </div>

    </div><!-- end .bulk-row -->

  </div><!-- end #productOverlay -->

  <script>
    const video = document.getElementById('bgVideo');
    const overlay = document.getElementById('productOverlay');
    let shown = false;

    video.addEventListener('timeupdate', function () {
      if (video.currentTime >= 5.5 && !shown) {
        shown = true;
        overlay.classList.add('visible');
      }
    });

    video.addEventListener('ended', function () {
      overlay.style.transition = 'none';
      overlay.classList.remove('visible');
      shown = false;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          overlay.style.transition = '';
          video.currentTime = 0;
          video.play();
        });
      });
    });

    video.play().catch(() => {
      document.addEventListener('click', () => video.play(), { once: true });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
